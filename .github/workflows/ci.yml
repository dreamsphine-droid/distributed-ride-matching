name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test Backend ──────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: rideshare_test
          POSTGRES_USER: rideshare_user
          POSTGRES_PASSWORD: rideshare_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://rideshare_user:rideshare_pass@localhost:5432/rideshare_test

      - name: Push database schema
        working-directory: ./backend
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://rideshare_user:rideshare_pass@localhost:5432/rideshare_test

      - name: Health check backend
        working-directory: ./backend
        run: |
          node -e "require('./src/utils/db')" && echo "DB module loads OK"
          node -e "require('./src/app')" && echo "App module loads OK"
        env:
          DATABASE_URL: postgresql://rideshare_user:rideshare_pass@localhost:5432/rideshare_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # ─── Build Frontend ───────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://your-backend.onrender.com
          VITE_WS_URL: wss://your-backend.onrender.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Docker Build & Push ──────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
